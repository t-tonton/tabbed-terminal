name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tauri-release:
    name: Tauri Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload release artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-macos
          path: src-tauri/target/release/bundle/**

      - name: Upload release artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-windows
          path: src-tauri/target/release/bundle/**

      - name: Generate SHA256 checksums
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle
          # Release artifacts to checksum (filenames may contain spaces).
          find_artifacts() {
            find . -type f \( \
              -name "*.app.tar.gz" -o \
              -name "*.app.tar.gz.sig" -o \
              -name "*.tar.gz" -o \
              -name "*.msi" -o \
              -name "*.exe" -o \
              -name "*.dmg" -o \
              -name "*.sig" \
            \) "$@"
          }
          # Guard against an empty result so we never publish an empty
          # SHA256SUMS file (GitHub rejects 0-byte assets).
          if [ -z "$(find_artifacts)" ]; then
            echo "No bundle artifacts to checksum on ${RUNNER_OS}; skipping."
            exit 0
          fi
          # shasum is absent on Windows runners; prefer sha256sum when available.
          if command -v sha256sum >/dev/null 2>&1; then
            hash_cmd="sha256sum"
          else
            hash_cmd="shasum -a 256"
          fi
          find_artifacts -print0 | sort -z | xargs -0 $hash_cmd > "SHA256SUMS-${RUNNER_OS}.txt"

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/SHA256SUMS-*.txt
